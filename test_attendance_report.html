<body>

    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const token = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjo0LCJyb2xlIjoia2VwYWxhX3NwcGciLCJleHAiOjE3NzI2OTIwNzksImlhdCI6MTc3MjYwNTY3OX0.ALlfxpVRlq4V2ODwQcrzJnHx2RLQaFGJaAv48HOSWtI';
            
            const url = 'http://localhost:8080/api/v1/attendance/report?start_date=2026-03-01&end_date=2026-03-31';
            
            try {
                const response = await fetch(url, {
                    headers: {
