<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background plate -->
  <rect x="40" y="30" width="320" height="240" rx="8" fill="#E8EDE5"/>
  <!-- Kitchen counter -->
  <rect x="60" y="180" width="280" height="60" rx="4" fill="#D8D8DB"/>
  <!-- Pot on stove -->
  <rect x="100" y="140" width="60" height="40" rx="4" fill="#303030"/>
  <rect x="95" y="135" width="70" height="10" rx="2" fill="#6B6B6B"/>
  <ellipse cx="130" cy="135" rx="25" ry="4" fill="#CCE2C8" opacity="0.6"/>
  <!-- Steam lines -->
  <path d="M115 125 Q112 115 115 105" stroke="#CCE2C8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M130 120 Q127 110 130 100" stroke="#CCE2C8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M145 125 Q142 115 145 105" stroke="#CCE2C8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Delivery truck -->
  <rect x="230" y="145" width="80" height="35" rx="4" fill="#303030"/>
  <rect x="200" y="155" width="35" height="25" rx="4" fill="#6B6B6B"/>
  <circle cx="220" cy="182" r="8" fill="#D8D8DB"/>
  <circle cx="220" cy="182" r="4" fill="#303030"/>
  <circle cx="290" cy="182" r="8" fill="#D8D8DB"/>
  <circle cx="290" cy="182" r="4" fill="#303030"/>
  <!-- Food boxes on truck -->
  <rect x="240" y="150" width="20" height="15" rx="2" fill="#CCE2C8"/>
  <rect x="265" y="150" width="20" height="15" rx="2" fill="#CCE2C8"/>
  <!-- Plate with food -->
  <ellipse cx="330" cy="170" rx="25" ry="8" fill="#D8D8DB"/>
  <ellipse cx="330" cy="168" rx="20" ry="6" fill="#CCE2C8"/>
  <circle cx="325" cy="165" r="4" fill="#303030" opacity="0.3"/>
  <circle cx="335" cy="166" r="3" fill="#303030" opacity="0.3"/>
  <!-- Title text area -->
  <rect x="80" y="50" width="120" height="8" rx="2" fill="#303030" opacity="0.7"/>
  <rect x="80" y="65" width="180" height="6" rx="2" fill="#6B6B6B" opacity="0.4"/>
  <rect x="80" y="78" width="140" height="6" rx="2" fill="#6B6B6B" opacity="0.4"/>
</svg>