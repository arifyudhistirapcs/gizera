  <circle cx="90" cy="65" r="28" fill="#CCE2C8" opacity="0.3"/>
  <!-- Handle -->
  <line x1="115" y1="90" x2="145" y2="120" stroke="#6B6B6B" stroke-width="6" stroke-linecap="round"/>
  <!-- X mark inside glass (nothing found) -->
  <line x1="78" y1="55" x2="102" y2="75" stroke="#6B6B6B" stroke-width="3" stroke-linecap="round"/>
  <line x1="102" y1="55" x2="78" y2="75" stroke="#6B6B6B" stroke-width="3" stroke-linecap="round"/>
  <!-- Decorative dots -->
