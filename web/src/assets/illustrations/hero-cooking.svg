<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <!-- Chef character -->
  <g transform="translate(30, 20)">
    <!-- Chef hat -->
    <ellipse cx="40" cy="18" rx="22" ry="16" fill="white" opacity="0.95"/>
    <rect x="22" y="16" width="36" height="8" rx="2" fill="white" opacity="0.95"/>
    <!-- Head -->
    <circle cx="40" cy="38" r="14" fill="#F5C6A0"/>
    <!-- Eyes -->
    <circle cx="35" cy="36" r="2" fill="#303030"/>
    <circle cx="45" cy="36" r="2" fill="#303030"/>
    <!-- Smile -->
    <path d="M35 42 Q40 47 45 42" stroke="#303030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="28" y="52" width="24" height="30" rx="4" fill="white" opacity="0.9"/>
    <!-- Apron -->
    <rect x="30" y="56" width="20" height="24" rx="3" fill="#CCE2C8"/>
    <!-- Arms -->
    <rect x="12" y="56" width="16" height="6" rx="3" fill="#F5C6A0" transform="rotate(-15 20 59)"/>
    <rect x="52" y="54" width="18" height="6" rx="3" fill="#F5C6A0" transform="rotate(20 61 57)"/>
    <!-- Legs -->
    <rect x="30" y="82" width="8" height="18" rx="3" fill="#303030"/>
    <rect x="42" y="82" width="8" height="18" rx="3" fill="#303030"/>
    <!-- Shoes -->
    <ellipse cx="34" cy="100" rx="7" ry="4" fill="#303030"/>
    <ellipse cx="46" cy="100" rx="7" ry="4" fill="#303030"/>
  </g>
  <!-- Cooking pot -->
  <g transform="translate(100, 55)">
    <ellipse cx="35" cy="50" rx="32" ry="8" fill="#6B6B6B" opacity="0.3"/>
    <rect x="5" y="20" width="60" height="30" rx="6" fill="#D8D8DB"/>
    <rect x="0" y="18" width="70" height="6" rx="3" fill="#6B6B6B"/>
    <!-- Steam -->
    <path d="M25 14 Q22 6 28 2" stroke="white" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M35 12 Q32 4 38 0" stroke="white" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M45 14 Q42 6 48 2" stroke="white" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Spoon -->
    <rect x="55" y="5" width="4" height="25" rx="2" fill="#D97706" transform="rotate(15 57 17)"/>
    <ellipse cx="58" cy="5" rx="5" ry="6" fill="#D97706" transform="rotate(15 58 5)"/>
  </g>
  <!-- Delivery truck -->
  <g transform="translate(190, 60)">
    <rect x="0" y="20" width="50" height="30" rx="4" fill="white" opacity="0.9"/>
    <rect x="50" y="28" width="25" height="22" rx="3" fill="white" opacity="0.85"/>
    <!-- Windshield -->
    <rect x="52" y="30" width="18" height="10" rx="2" fill="#CCE2C8" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="15" cy="52" r="7" fill="#303030"/>
    <circle cx="15" cy="52" r="3" fill="#6B6B6B"/>
    <circle cx="60" cy="52" r="7" fill="#303030"/>
    <circle cx="60" cy="52" r="3" fill="#6B6B6B"/>
    <!-- Food box on truck -->
    <rect x="8" y="10" width="18" height="14" rx="2" fill="#FDEAE7"/>
    <rect x="28" y="12" width="14" height="12" rx="2" fill="#D1FAE5"/>
    <!-- Heart on box -->
    <text x="14" y="22" font-size="8" text-anchor="middle">🍱</text>
  </g>
  <!-- Decorative food items -->
  <text x="180" y="30" font-size="20">🍛</text>
  <text x="250" y="45" font-size="16">🥗</text>
  <text x="220" y="25" font-size="14">🍲</text>
  <text x="270" y="70" font-size="12">⭐</text>
</svg>
