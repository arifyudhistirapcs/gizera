name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Backend - Go Build & Test
  # ============================================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: erp_sppg_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o ./bin/server ./cmd/server

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: erp_sppg_test
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_SSLMODE: disable
          JWT_SECRET: test-secret-key-for-ci
          GIN_MODE: test
        run: go test ./... -v -count=1

  # ============================================
  # Web Dashboard - Build & Test
  # ============================================
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1
        run: npm run build

      - name: Run tests
        run: npm run test

  # ============================================
  # PWA Mobile - Build & Test
  # ============================================
  pwa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1
        run: npm run build

  # ============================================
  # Docker Build Verification
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, web, pwa]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t erp-sppg-backend:ci ./backend

      - name: Build web image
        run: docker build --build-arg VITE_API_BASE_URL=/api/v1 -t erp-sppg-web:ci ./web

      - name: Build pwa image
        run: docker build --build-arg VITE_API_BASE_URL=/api/v1 -t erp-sppg-pwa:ci ./pwa

      - name: Verify images
        run: |
          docker images | grep erp-sppg
